name: Theme Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  theme-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install Theme Check
        run: gem install theme-check

      - name: Run Theme Check
        run: theme-check .
